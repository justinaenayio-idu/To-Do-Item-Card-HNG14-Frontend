<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>

  <!--
    This page contains exactly one Todo Item Card.
    All spec-required data-testid attributes are in the markup below.
    Behaviour (checkbox toggle, time-remaining, edit, delete) is in index.js.
  -->

  <main class="page" role="main">

    <article
      data-testid="test-todo-card"
      class="card"
      aria-label="Todo task card"
    >

      <!-- ── Top: checkbox + title + description ────────────── -->
      <div class="card-top">

        <label class="cb-label" for="complete-toggle">
          <input
            type="checkbox"
            id="complete-toggle"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
          <span class="cb-text">Mark complete</span>
        </label>

        <div class="card-title-block">
          <h2 class="card-title" data-testid="test-todo-title">
            Redesign onboarding flow for mobile users
          </h2>
          <p class="card-description" data-testid="test-todo-description">
            Update the mobile onboarding screens to improve conversion.
            Reduce friction in steps 2 and 3, and add progress indicators
            throughout the flow.
          </p>
        </div>

      </div>

      <!-- ── Badges: priority + status ─────────────────────── -->
      <div class="card-badges" role="group" aria-label="Task status indicators">

        <span
          class="badge badge-priority"
          data-testid="test-todo-priority"
          aria-label="Priority: High"
        >High</span>

        <span
          class="badge badge-status"
          data-testid="test-todo-status"
          id="todo-status"
          aria-label="Status: In Progress"
        >In Progress</span>

      </div>

      <!-- ── Meta: due date + time remaining ────────────────── -->
      <div class="card-meta">

        <div class="meta-row">
          <svg class="meta-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true" width="14" height="14">
            <rect x="1.5" y="2.5" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 1.5v2M11 1.5v2M1.5 6.5h13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="meta-label">Due</span>
          <time
            data-testid="test-todo-due-date"
            datetime="2026-04-30T18:00:00Z"
            class="meta-value"
          >Apr 28, 2026</time>
        </div>

        <div class="meta-row">
          <svg class="meta-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true" width="14" height="14">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 4.5V8l2.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="meta-label">Time</span>
          <time
            data-testid="test-todo-time-remaining"
            id="time-remaining"
            datetime="2026-04-30T18:00:00Z"
            class="meta-value meta-countdown"
            aria-live="polite"
            aria-atomic="true"
          ></time>
        </div>

      </div>

      <!-- ── Tags ───────────────────────────────────────────── -->
      <ul
        class="card-tags"
        data-testid="test-todo-tags"
        role="list"
        aria-label="Task tags"
      >
        <li data-testid="test-todo-tag-work"   role="listitem" class="tag">Work</li>
        <li data-testid="test-todo-tag-urgent" role="listitem" class="tag">Urgent</li>
        <li role="listitem" class="tag">Design</li>
      </ul>

      <!-- ── Footer: edit + delete ──────────────────────────── -->
      <div class="card-footer">

        <button
          class="btn btn-edit"
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
        >
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true" width="14" height="14">
            <path d="M11.5 2.5l2 2L5 13H3v-2L11.5 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          Edit
        </button>

        <button
          class="btn btn-delete"
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
        >
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true" width="14" height="14">
            <path d="M2 4h12M6 4V2h4v2M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Delete
        </button>

      </div>

    </article>

  </main>

  <script src="./index.js"></script>

</body>
</html>
